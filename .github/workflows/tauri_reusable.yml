name: Tauri Reusable Build

on:
  workflow_call:
    inputs:
      mam_module_path:
        type: string
        required: true
      mam_dev_port:
        type: string
        required: false
        default: '9080'
      mam_dist_path:
        type: string
        required: false
        default: ''
      tauri_config:
        type: string
        required: false
        default: src-tauri/tauri.conf.json
    secrets:
      GH_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: linux
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            squashfs-tools

      - name: Install npm deps
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            npm init -y
          fi
          npm install --no-save mam @tauri-apps/cli

      - name: Build MAM web bundle
        shell: bash
        run: |
          MODULE_PATH="${{ inputs.mam_module_path }}"
          DIST_PATH="${{ inputs.mam_dist_path }}"
          WAIT_SECONDS=240

          if [ -z "${DIST_PATH}" ]; then
            DIST_PATH="${MODULE_PATH}/-"
          fi

          npx mam "${MODULE_PATH}" &
          MAM_PID=$!

          cleanup() {
            kill "${MAM_PID}" 2>/dev/null || true
          }
          trap cleanup EXIT

          for ((i=1; i<=WAIT_SECONDS; i++)); do
            if [ -d "${DIST_PATH}" ]; then
              if [ -f "${DIST_PATH}/web.js" ] || [ -f "${DIST_PATH}/index.html" ] || [ -f "${DIST_PATH}/web.css" ]; then
                echo "[mam] bundle ready: ${DIST_PATH}"
                exit 0
              fi
            fi

            if ! kill -0 "${MAM_PID}" 2>/dev/null; then
              echo "[mam] process exited before bundle was detected"
              exit 1
            fi

            sleep 1
          done

          echo "[mam] timeout waiting for bundle: ${DIST_PATH}"
          exit 1

      - name: Configure Tauri config
        shell: bash
        run: |
          MODULE_PATH="${{ inputs.mam_module_path }}"
          DIST_PATH="${{ inputs.mam_dist_path }}"
          PORT="${{ inputs.mam_dev_port }}"
          TAURI_CONFIG="${{ inputs.tauri_config }}"

          if [ -z "${DIST_PATH}" ]; then
            DIST_PATH="${MODULE_PATH}/-"
          fi

          DEV_URL="http://localhost:${PORT}/${MODULE_PATH}/"
          FRONTEND_DIST="../${DIST_PATH}"

          node -e '
          const fs = require("fs");
          const file = process.argv[1];
          const devUrl = process.argv[2];
          const frontendDist = process.argv[3];
          const conf = JSON.parse(fs.readFileSync(file, "utf8"));
          conf.build = conf.build || {};
          conf.build.devUrl = devUrl;
          conf.build.frontendDist = frontendDist;
          fs.writeFileSync(file, JSON.stringify(conf, null, 2) + "\n");
          ' "${TAURI_CONFIG}" "${DEV_URL}" "${FRONTEND_DIST}"

      - name: Build Tauri app
        run: npx tauri build --config "${{ inputs.tauri_config }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.artifact }}
          path: src-tauri/target/release/bundle
