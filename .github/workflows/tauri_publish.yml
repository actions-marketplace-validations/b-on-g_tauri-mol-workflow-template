name: Tauri Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  MAM_MODULE_PATH: mynamespace/application/app
  MAM_DEV_PORT: '9080'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: linux
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            squashfs-tools

      - name: Install npm deps
        run: npm ci

      - name: Build MAM web bundle
        shell: bash
        run: |
          bash ./scripts/build-mam.sh "${MAM_MODULE_PATH}"

      - name: Configure Tauri paths
        shell: bash
        run: |
          bash ./scripts/configure-tauri-path.sh "${MAM_MODULE_PATH}" "${MAM_DEV_PORT}"

      - name: Build Tauri app
        run: npx tauri build --config src-tauri/tauri.conf.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.artifact }}
          path: src-tauri/target/release/bundle

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            dist/**/*.dmg
            dist/**/*.app.tar.gz
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.rpm
